name: CI - Compuroom

on:
  push:
    branches:
      - develop
      - 'feature/*'
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Run ESLint
        working-directory: ./backend
        run: npm run lint

  test:
    name: Unit Test (Jest + Supertest)
    runs-on: ubuntu-latest
    needs: lint

    # ตั้ง Postgres service container ให้ backend เชื่อมต่อได้จริงตอนรัน test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: compuroom_test
          POSTGRES_USER: compuuser
          POSTGRES_PASSWORD: compupass1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U compuuser"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Run Jest tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: compuroom_test
          DB_USER: compuuser
          DB_PASSWORD: compupass1234
        run: npm test

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t compuroom-api:ci ./backend

      - name: Build frontend image
        run: docker build --build-arg VITE_API_URL=http://localhost:3001 -t compuroom-web:ci ./frontend